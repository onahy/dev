function buildLangs() {
  const grid = document.getElementById('langGrid');
  langs.forEach((l, i) => {
    const card = document.createElement('div');
    card.className = 'lang-card';
    card.style.setProperty('--lc', l.color);
    card.innerHTML = `
      <div class="lang-header">
        <div class="lang-icon" style="background:${l.bg};color:${l.color};">${l.short}</div>
        <div><div class="lang-name">${l.name}</div><div class="lang-type">${l.type}</div></div>
      </div>
      ${l.skills.map(s => `
        <div class="skill-bar-wrap">
          <div class="skill-bar-label"><span>${s.l}</span><span>${s.v}%</span></div>
          <div class="skill-bar-track"><div class="skill-bar-fill" style="width:0%;background:${l.color}" data-w="${s.v}"></div></div>
        </div>`).join('')}
      <div class="lang-tags">${l.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
    card.onclick = () => showLangDetail(i, card);
    grid.appendChild(card);
  });
  setTimeout(animateBars, 200);
}

function animateBars() {
  document.querySelectorAll('.skill-bar-fill').forEach(el => {
    el.style.width = el.dataset.w + '%';
  });
}

let selectedCard = null;
function showLangDetail(i, card) {
  const l = langs[i];
  const detail = document.getElementById('lang-detail');
  if (selectedCard === card && detail.classList.contains('show')) {
    detail.classList.remove('show');
    card.classList.remove('selected');
    selectedCard = null;
    return;
  }
  if (selectedCard) selectedCard.classList.remove('selected');
  selectedCard = card;
  card.classList.add('selected');
  detail.classList.add('show');
  detail.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <h3 style="color:${l.color}">${l.name} — kod örneği</h3>
      <span style="font-size:11px;color:#6e7681;">${l.file}</span>
    </div>
    <p style="font-size:13px;color:#8b949e;margin-bottom:1rem;">${l.desc}</p>
    <div class="code-panel">
      <div class="code-header">
        <div class="code-dots"><div class="code-dot cd-r"></div><div class="code-dot cd-y"></div><div class="code-dot cd-g"></div></div>
        <span class="code-filename">${l.file}</span>
      </div>
      <div class="code-body">${l.snippet}</div>
    </div>`;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildProjects() {
  const grid = document.getElementById('projectGrid');
  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="project-header">
        <span class="project-name">${p.name}</span>
        <span class="project-star">★ ${p.stars}</span>
      </div>
      <p class="project-desc">${p.desc}</p>
      <div class="project-foot">
        <div class="lang-dot" style="background:${p.color}"></div>
        <span class="project-lang">${p.lang}</span>
        ${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}
      </div>`;
    grid.appendChild(card);
  });
}

function buildContribs() {
  const grid = document.getElementById('contribGrid');
  const levels = ['', 'l1', 'l2', 'l3', 'l4'];
  for (let i = 0; i < 364; i++) {
    const cell = document.createElement('div');
    cell.className = 'contrib-cell';
    const r = Math.random();
    if (r > 0.6) {
      const lvl = Math.ceil(r * 4);
      cell.classList.add(levels[Math.min(lvl, 4)]);
    }
    grid.appendChild(cell);
  }
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'langs') setTimeout(animateBars, 100);
}

buildLangs();
buildProjects();
buildContribs();
</script>
